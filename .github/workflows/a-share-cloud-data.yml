name: A股 Agent 云端数据层

on:
  workflow_dispatch:
    inputs:
      trade_date:
        description: "交易日期 YYYY-MM-DD，留空则使用 Asia/Shanghai 今日"
        required: false
        default: ""
  schedule:
    # A股收盘后运行：北京时间周一至周五 15:40。
    - cron: "40 7 * * 1-5"

jobs:
  cloud-data-layer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine trade date
        id: date
        shell: bash
        run: |
          if [[ -n "${{ github.event.inputs.trade_date }}" ]]; then
            echo "trade_date=${{ github.event.inputs.trade_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "trade_date=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate cloud P1 data package
        shell: bash
        run: |
          python3 tools/bin/collect_cloud_market_data.py \
            --date "${{ steps.date.outputs.trade_date }}" \
            --output-root . \
            --update-index

      - name: Validate generated package
        shell: bash
        run: |
          python3 tools/bin/check_cloud_market_data.py \
            --db /tmp/nonexistent-a-share-agent-cloud.db \
            --cloud-root . \
            --date "${{ steps.date.outputs.trade_date }}" \
            --fail-on-missing

      - name: Publish package to GitHub Pages source
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.date.outputs.trade_date }}/data.json" \
                  "${{ steps.date.outputs.trade_date }}/manifest.json" \
                  latest.json index.html
          if git diff --cached --quiet; then
            echo "No cloud P1 package changes to publish."
          else
            git commit -m "Publish cloud P1 data ${{ steps.date.outputs.trade_date }}"
            git push
          fi

      - name: Upload cloud data artifact
        uses: actions/upload-artifact@v4
        with:
          name: a-share-cloud-data-${{ steps.date.outputs.trade_date }}
          path: |
            ${{ steps.date.outputs.trade_date }}/data.json
            ${{ steps.date.outputs.trade_date }}/manifest.json
          retention-days: 30
